services:
  ssgfinance-mysql:
    image: mysql:8.4
    container_name: ssgfinance-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ssgfinance-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "3306"
    networks:
      - ssgfinance-network

  ssgfinance-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ssgfinance-app:latest
    container_name: ssgfinance-app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5183/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    expose:
      - "5183"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      APP_PORT: ${APP_PORT}
      DATA_DIR: ${DATA_DIR}
      DB_HOST: ssgfinance-mysql
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SSL: ${SMTP_SSL}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
    volumes:
      - ${DATA_DIR}/uploads:/app/wwwroot/uploads
    depends_on:
      ssgfinance-mysql:
        condition: service_healthy
    networks:
      - ssgfinance-network

  ssgfinance-nginx:
    image: nginx:alpine
    container_name: ssgfinance-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ssgfinance-app
    networks:
      - ssgfinance-network

volumes:
  ssgfinance-mysql-data:

networks:
  ssgfinance-network:
    name: ssgfinance-network
    driver: bridge